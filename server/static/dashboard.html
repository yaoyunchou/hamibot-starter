<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>闲鱼自动化 · 控制台</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #6366f1;
    --accent-h: #818cf8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --orange: #f97316;
    --radius: 10px;
    --font: 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* ── Layout ── */
  .shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 24px 0; display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 0; height: 100vh;
  }
  .sidebar-logo {
    padding: 0 20px 20px; font-size: 15px; font-weight: 700;
    color: var(--accent-h); letter-spacing: .5px;
    border-bottom: 1px solid var(--border); margin-bottom: 12px;
  }
  .sidebar-logo span { font-size: 22px; margin-right: 8px; }
  .nav-item {
    padding: 10px 20px; cursor: pointer; border-radius: 0;
    font-size: 14px; color: var(--muted); display: flex; align-items: center; gap: 10px;
    transition: all .15s; border-left: 3px solid transparent;
  }
  .nav-item:hover { color: var(--text); background: rgba(99,102,241,.08); }
  .nav-item.active { color: var(--accent-h); background: rgba(99,102,241,.12); border-left-color: var(--accent); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .main { padding: 32px; display: flex; flex-direction: column; gap: 24px; }
  .header { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .badge-red { background: rgba(239,68,68,.15); color: var(--red); }
  .badge-green { background: rgba(34,197,94,.15); color: var(--green); }
  .badge-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
  .badge-blue { background: rgba(59,130,246,.15); color: var(--blue); }
  .badge-muted { background: rgba(100,116,139,.12); color: var(--muted); }

  /* ── Cards ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; }
  .stat-val { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--muted); }

  /* ── Task actions ── */
  .task-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
    transition: all .15s; font-family: var(--font);
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-h); }
  .btn-outline {
    background: transparent; border: 1px solid var(--border); color: var(--text);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent-h); background: rgba(99,102,241,.06); }
  .btn-danger { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
  .btn-danger:hover { background: rgba(239,68,68,.2); }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Table ── */
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 600;
             font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
             border-bottom: 1px solid var(--border); }
  .tbl td { padding: 12px; border-bottom: 1px solid rgba(42,45,58,.6); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: rgba(99,102,241,.04); }
  .type-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    background: rgba(99,102,241,.12); color: var(--accent-h);
  }
  .empty-tip { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  /* ── Alerts ── */
  .alert-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px; border-radius: 8px; margin-bottom: 8px;
    border: 1px solid;
  }
  .alert-item.warn { background: rgba(234,179,8,.06); border-color: rgba(234,179,8,.2); }
  .alert-item.error { background: rgba(239,68,68,.06); border-color: rgba(239,68,68,.2); }
  .alert-item.info { background: rgba(59,130,246,.06); border-color: rgba(59,130,246,.18); }
  .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .alert-body { flex: 1; }
  .alert-msg { font-size: 13px; margin-bottom: 3px; }
  .alert-meta { font-size: 11px; color: var(--muted); }

  /* ── Refresh ── */
  .refresh-bar {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--muted);
  }
  .refresh-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tab {
    padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;
  }
  .tab.active { color: var(--accent-h); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 18px; font-size: 13px;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
    max-width: 300px;
  }
  #toast.show { opacity: 1; }

  .page { display: none; }
  .page.active { display: block; }

  /* ── Debug Tool ── */
  .dbg-quick { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .dbg-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 960px) { .dbg-panels { grid-template-columns: 1fr; } }
  .dbg-input-group { margin-bottom: 12px; }
  .dbg-input-group label {
    display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: .5px; font-weight: 600;
  }
  .dbg-input, .dbg-select, .dbg-textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 8px 12px; font-size: 13px; font-family: var(--font);
    transition: border-color .15s;
  }
  .dbg-input:focus, .dbg-select:focus, .dbg-textarea:focus { outline: none; border-color: var(--accent); }
  .dbg-textarea { font-family: 'SF Mono', 'Fira Code', monospace; min-height: 120px; resize: vertical; }
  .dbg-result {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text); overflow: auto; max-height: 480px;
    white-space: pre-wrap; word-break: break-all; line-height: 1.6;
  }
  .dbg-result-placeholder { color: var(--muted); font-style: italic; }
  .dbg-result img { max-width: 100%; border-radius: 6px; margin-top: 8px; }
  .dbg-status-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px;
  }
  .dbg-status-dot.pending { background: var(--blue); }
  .dbg-status-dot.running { background: var(--yellow); animation: pulse 1s infinite; }
  .dbg-status-dot.completed { background: var(--green); }
  .dbg-status-dot.error { background: var(--red); }
  .dbg-history-item {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background .1s;
  }
  .dbg-history-item:hover { background: rgba(99,102,241,.06); }
  .dbg-history-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo"><span>🐟</span>闲鱼控制台</div>
    <div class="nav-item active" onclick="showPage('dashboard', this)">
      <span class="nav-icon">📊</span>总览
    </div>
    <div class="nav-item" onclick="showPage('tasks', this)">
      <span class="nav-icon">📋</span>任务队列
    </div>
    <div class="nav-item" onclick="showPage('alerts', this)">
      <span class="nav-icon">🔔</span>预警中心
      <span id="alert-badge" class="badge badge-red" style="margin-left:auto;display:none"></span>
    </div>
    <div class="nav-item" onclick="showPage('cache', this)">
      <span class="nav-icon">🗃️</span>元素缓存
    </div>
    <div class="nav-item" onclick="showPage('debug', this); fetchDebugHistory()">
      <span class="nav-icon">🛠️</span>调试工具
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="header">
      <h1 id="page-title">总览</h1>
      <div class="refresh-bar">
        <div class="refresh-dot"></div>
        <span id="last-refresh">--</span>
        <button class="btn btn-outline btn-sm" onclick="refresh()">刷新</button>
      </div>
    </div>

    <!-- ── 总览 ── -->
    <div id="page-dashboard" class="page active">
      <div class="stat-grid" id="stats">
        <div class="stat"><div class="stat-val" id="s-total">-</div><div class="stat-label">总任务数</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--blue)" id="s-running">-</div><div class="stat-label">执行中</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--green)" id="s-done">-</div><div class="stat-label">已完成</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--red)" id="s-alert">-</div><div class="stat-label">未确认预警</div></div>
      </div>

      <div class="card">
        <div class="card-title">快速派发任务</div>
        <div class="task-actions">
          <button class="btn btn-primary" onclick="addTask('goldCoin')">🪙 获取金币</button>
          <button class="btn btn-outline" onclick="addTask('comment')">💬 自动评论</button>
          <button class="btn btn-outline" onclick="addTask('product')">📦 商品曝光</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          近期任务
          <a style="font-size:12px;color:var(--accent);cursor:pointer;font-weight:400;text-transform:none" onclick="showPage('tasks', document.querySelectorAll('.nav-item')[1])">查看全部 →</a>
        </div>
        <table class="tbl">
          <thead><tr>
            <th>类型</th><th>状态</th><th>创建时间</th><th>耗时</th><th>备注</th>
          </tr></thead>
          <tbody id="dash-task-list"><tr><td colspan="5" class="empty-tip">加载中...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- ── 任务队列 ── -->
    <div id="page-tasks" class="page">
      <div class="card">
        <div class="card-title">
          任务队列
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="addTask('goldCoin')">+ 获取金币</button>
            <button class="btn btn-outline btn-sm" onclick="addTask('comment')">+ 自动评论</button>
            <button class="btn btn-outline btn-sm" onclick="addTask('product')">+ 商品曝光</button>
          </div>
        </div>
        <div class="tabs">
          <div class="tab active" onclick="filterTasks('', this)">全部</div>
          <div class="tab" onclick="filterTasks('pending', this)">待执行</div>
          <div class="tab" onclick="filterTasks('running', this)">执行中</div>
          <div class="tab" onclick="filterTasks('completed', this)">已完成</div>
          <div class="tab" onclick="filterTasks('error,timeout', this)">异常</div>
        </div>
        <table class="tbl">
          <thead><tr>
            <th>类型</th><th>状态</th><th>创建时间</th><th>开始时间</th><th>完成时间</th><th>备注</th><th>操作</th>
          </tr></thead>
          <tbody id="task-list"><tr><td colspan="7" class="empty-tip">加载中...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- ── 元素缓存 ── -->
    <div id="page-cache" class="page">
      <div class="card">
        <div class="card-title">
          元素缓存 <code style="font-size:11px;font-weight:400;color:var(--muted);font-family:monospace">GET /api/cache/element</code>
          <div style="display:flex;gap:8px;align-items:center">
            <span id="cache-count" class="badge badge-muted" style="display:none"></span>
            <button class="btn btn-primary btn-sm" onclick="fetchCache()">🔄 拉取缓存</button>
            <button class="btn btn-outline btn-sm" onclick="toggleCacheRaw()">{ } 原始JSON</button>
          </div>
        </div>
        <div id="cache-raw-box" style="display:none;margin-bottom:16px">
          <pre id="cache-raw" style="
            background:var(--bg);border:1px solid var(--border);border-radius:8px;
            padding:14px;font-size:12px;font-family:monospace;color:var(--muted);
            overflow:auto;max-height:320px;white-space:pre-wrap;word-break:break-all;
          ">-</pre>
        </div>
        <table class="tbl">
          <thead><tr>
            <th style="width:36%">Key</th>
            <th>Value</th>
          </tr></thead>
          <tbody id="cache-list"><tr><td colspan="2" class="empty-tip">点击「拉取缓存」查看数据</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- ── 预警 ── -->
    <div id="page-alerts" class="page">
      <div class="card">
        <div class="card-title">
          预警中心
          <button class="btn btn-outline btn-sm" onclick="clearAcknowledged()">清除已确认</button>
        </div>
        <div class="tabs">
          <div class="tab active" onclick="filterAlerts(null, this)">全部</div>
          <div class="tab" onclick="filterAlerts(false, this)">未确认</div>
          <div class="tab" onclick="filterAlerts(true, this)">已确认</div>
        </div>
        <div id="alert-list"><div class="empty-tip">加载中...</div></div>
      </div>
    </div>

    <!-- ── 调试工具 ── -->
    <div id="page-debug" class="page">
      <!-- 快捷按钮 -->
      <div class="dbg-quick">
        <button class="btn btn-primary" onclick="dbgSendQuick('page_info')">📱 页面信息</button>
        <button class="btn btn-outline" onclick="dbgSendQuick('screenshot')">🖼️ 截图</button>
        <button class="btn btn-outline" onclick="dbgSendQuick('layout',{depth:3})">🌳 布局树</button>
        <button class="btn btn-danger btn-sm" onclick="dbgClearAll()" style="margin-left:auto">清空记录</button>
      </div>

      <div class="dbg-panels">
        <!-- 左栏：指令面板 -->
        <div>
          <div class="card">
            <div class="card-title">发送调试指令</div>
            <div class="tabs" id="dbg-type-tabs">
              <div class="tab active" onclick="dbgSwitchType('element',this)">元素查询</div>
              <div class="tab" onclick="dbgSwitchType('script',this)">脚本执行</div>
              <div class="tab" onclick="dbgSwitchType('screenshot',this)">截图</div>
              <div class="tab" onclick="dbgSwitchType('layout',this)">布局</div>
            </div>

            <!-- element -->
            <div id="dbg-form-element" class="dbg-form">
              <div class="dbg-input-group">
                <label>选择器方法</label>
                <select class="dbg-select" id="dbg-el-method">
                  <option value="text">text</option>
                  <option value="textContains" selected>textContains</option>
                  <option value="id">id</option>
                  <option value="desc">desc</option>
                  <option value="descContains">descContains</option>
                  <option value="className">className</option>
                </select>
              </div>
              <div class="dbg-input-group">
                <label>匹配值</label>
                <input class="dbg-input" id="dbg-el-value" placeholder="例：我发布的" />
              </div>
              <div style="display:flex;gap:10px">
                <div class="dbg-input-group" style="flex:1">
                  <label>操作</label>
                  <select class="dbg-select" id="dbg-el-action">
                    <option value="info" selected>info（详细信息）</option>
                    <option value="exists">exists（是否存在）</option>
                    <option value="click">click（点击）</option>
                    <option value="bounds">bounds（坐标）</option>
                  </select>
                </div>
                <div class="dbg-input-group" style="width:80px">
                  <label>超时(ms)</label>
                  <input class="dbg-input" id="dbg-el-timeout" type="number" value="3000" />
                </div>
                <div class="dbg-input-group" style="width:60px">
                  <label>Index</label>
                  <input class="dbg-input" id="dbg-el-index" type="number" value="0" />
                </div>
              </div>
              <button class="btn btn-primary" onclick="dbgSendElement()" style="width:100%;margin-top:4px">发送</button>
            </div>

            <!-- script -->
            <div id="dbg-form-script" class="dbg-form" style="display:none">
              <div class="dbg-input-group">
                <label>Auto.js 代码</label>
                <textarea class="dbg-textarea" id="dbg-script-code" placeholder="toast('hello');\nreturn 1 + 1;"></textarea>
              </div>
              <button class="btn btn-primary" onclick="dbgSendScript()" style="width:100%;margin-top:4px">执行</button>
            </div>

            <!-- screenshot -->
            <div id="dbg-form-screenshot" class="dbg-form" style="display:none">
              <div class="dbg-input-group">
                <label>JPEG 质量 (1-100)</label>
                <input class="dbg-input" id="dbg-ss-quality" type="number" value="60" min="1" max="100" />
              </div>
              <button class="btn btn-primary" onclick="dbgSendScreenshot()" style="width:100%;margin-top:4px">截图</button>
            </div>

            <!-- layout -->
            <div id="dbg-form-layout" class="dbg-form" style="display:none">
              <div class="dbg-input-group">
                <label>遍历深度</label>
                <input class="dbg-input" id="dbg-layout-depth" type="number" value="3" min="1" max="10" />
              </div>
              <button class="btn btn-primary" onclick="dbgSendLayout()" style="width:100%;margin-top:4px">获取布局</button>
            </div>
          </div>

          <!-- 历史记录 -->
          <div class="card" style="margin-top:20px">
            <div class="card-title">历史记录 <span id="dbg-history-count" class="badge badge-muted" style="display:none"></span></div>
            <div id="dbg-history" style="max-height:320px;overflow-y:auto">
              <div class="empty-tip">暂无记录</div>
            </div>
          </div>
        </div>

        <!-- 右栏：结果展示 -->
        <div>
          <div class="card" style="position:sticky;top:32px">
            <div class="card-title">
              执行结果
              <span id="dbg-result-status" style="font-size:12px;font-weight:400;text-transform:none"></span>
            </div>
            <div id="dbg-result" class="dbg-result">
              <span class="dbg-result-placeholder">发送指令后，结果将在此展示...</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
const BASE = '';
let taskFilter = '';
let alertFilter = null;
let allTasks = [];
let allAlerts = [];

// ── Navigation ──
function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  document.getElementById('page-title').textContent = el.textContent.trim().replace(/\d+$/, '');
}

// ── Toast ──
function toast(msg, type = 'default') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = type === 'error' ? 'rgba(239,68,68,.4)' : type === 'ok' ? 'rgba(34,197,94,.3)' : '';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Status rendering ──
const STATUS_MAP = {
  pending:   ['待执行',  'badge-blue'],
  running:   ['执行中',  'badge-yellow'],
  completed: ['已完成',  'badge-green'],
  error:     ['异常',    'badge-red'],
  timeout:   ['超时',    'badge-red'],
};
const TYPE_LABEL = { goldCoin: '🪙 获取金币', comment: '💬 自动评论', product: '📦 商品曝光' };
const ALERT_ICON = { warn: '⚠️', error: '🔴', info: 'ℹ️' };

function statusBadge(s) {
  const [label, cls] = STATUS_MAP[s] || [s, 'badge-muted'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function elapsed(start, end) {
  if (!start) return '-';
  const s = new Date(start), e = end ? new Date(end) : new Date();
  const sec = Math.floor((e - s) / 1000);
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec / 60) + 'm';
  return (sec / 3600).toFixed(1) + 'h';
}

// ── Fetch ──
async function fetchTasks() {
  const r = await fetch(`${BASE}/api/control/tasks?limit=100`).then(r => r.json());
  allTasks = r.data || [];
  renderTasks();
  renderDash();
}

async function fetchAlerts() {
  const r = await fetch(`${BASE}/api/control/alerts?limit=100`).then(r => r.json());
  allAlerts = r.data || [];
  renderAlerts();
  updateAlertBadge();
}

// ── Render tasks ──
function filterTasks(status, el) {
  taskFilter = status;
  document.querySelectorAll('#page-tasks .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}

function renderTasks() {
  const list = taskFilter
    ? allTasks.filter(t => taskFilter.split(',').includes(t.status))
    : allTasks;
  const tbody = document.getElementById('task-list');
  if (!list.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty-tip">暂无任务</td></tr>'; return; }
  tbody.innerHTML = list.map(t => `
    <tr>
      <td><span class="type-tag">${TYPE_LABEL[t.type] || t.type}</span></td>
      <td>${statusBadge(t.status)}</td>
      <td>${t.created_at || '-'}</td>
      <td>${t.started_at || '-'}</td>
      <td>${t.completed_at || '-'}</td>
      <td style="color:var(--muted);font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis">${t.message || '-'}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">删除</button></td>
    </tr>`).join('');
}

// ── Render dash ──
function renderDash() {
  document.getElementById('s-total').textContent = allTasks.length;
  document.getElementById('s-running').textContent = allTasks.filter(t => t.status === 'running').length;
  document.getElementById('s-done').textContent = allTasks.filter(t => t.status === 'completed').length;
  const unack = allAlerts.filter(a => !a.acknowledged).length;
  document.getElementById('s-alert').textContent = unack;

  const recent = allTasks.slice(0, 8);
  const tbody = document.getElementById('dash-task-list');
  if (!recent.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty-tip">暂无任务</td></tr>'; return; }
  tbody.innerHTML = recent.map(t => `
    <tr>
      <td><span class="type-tag">${TYPE_LABEL[t.type] || t.type}</span></td>
      <td>${statusBadge(t.status)}</td>
      <td>${t.created_at || '-'}</td>
      <td>${elapsed(t.started_at, t.completed_at)}</td>
      <td style="color:var(--muted);font-size:12px">${t.message || '-'}</td>
    </tr>`).join('');
}

// ── Render alerts ──
function filterAlerts(ack, el) {
  alertFilter = ack;
  document.querySelectorAll('#page-alerts .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAlerts();
}

function renderAlerts() {
  const list = alertFilter === null
    ? allAlerts
    : allAlerts.filter(a => a.acknowledged === alertFilter);
  const container = document.getElementById('alert-list');
  if (!list.length) { container.innerHTML = '<div class="empty-tip">暂无预警</div>'; return; }
  container.innerHTML = list.map(a => `
    <div class="alert-item ${a.level}" style="${a.acknowledged ? 'opacity:.45' : ''}">
      <div class="alert-icon">${ALERT_ICON[a.level] || '🔔'}</div>
      <div class="alert-body">
        <div class="alert-msg">${a.message}</div>
        <div class="alert-meta">${a.timestamp}${a.task_id ? ' · 任务 ' + a.task_id.slice(0, 8) + '...' : ''}</div>
      </div>
      ${!a.acknowledged ? `<button class="btn btn-outline btn-sm" onclick="ackAlert('${a.id}')">确认</button>` : '<span style="font-size:12px;color:var(--muted)">已确认</span>'}
    </div>`).join('');
}

function updateAlertBadge() {
  const n = allAlerts.filter(a => !a.acknowledged).length;
  const b = document.getElementById('alert-badge');
  if (n > 0) { b.textContent = n; b.style.display = ''; }
  else { b.style.display = 'none'; }
}

// ── Actions ──
async function addTask(type) {
  const r = await fetch(`${BASE}/api/control/task`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type })
  }).then(r => r.json());
  if (r.code === 0) { toast('✅ 任务已加入队列', 'ok'); }
  else { toast('⚠️ ' + r.message, 'error'); }
  refresh();
}

async function deleteTask(id) {
  await fetch(`${BASE}/api/control/task/${id}`, { method: 'DELETE' });
  toast('已删除');
  refresh();
}

async function ackAlert(id) {
  await fetch(`${BASE}/api/control/alert/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ acknowledged: true })
  });
  refresh();
}

async function clearAcknowledged() {
  await fetch(`${BASE}/api/control/alerts/acknowledged`, { method: 'DELETE' });
  toast('已清除已确认预警');
  refresh();
}

// ── Cache ──
let cacheRawVisible = false;

async function fetchCache() {
  const tbody = document.getElementById('cache-list');
  const rawEl = document.getElementById('cache-raw');
  tbody.innerHTML = '<tr><td colspan="2" class="empty-tip">加载中...</td></tr>';
  try {
    const r = await fetch(`${BASE}/api/cache/element`).then(r => r.json());
    rawEl.textContent = JSON.stringify(r, null, 2);
    if (r.code !== 0) {
      tbody.innerHTML = `<tr><td colspan="2" class="empty-tip" style="color:var(--red)">接口返回异常: ${r.message || r.code}</td></tr>`;
      return;
    }
    let items = [];
    try { items = JSON.parse(r.data?.value || '[]'); } catch(e) { items = []; }
    const countEl = document.getElementById('cache-count');
    if (items.length) {
      countEl.textContent = items.length + ' 条';
      countEl.style.display = '';
    } else {
      countEl.style.display = 'none';
    }
    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="2" class="empty-tip">缓存为空</td></tr>';
      return;
    }
    tbody.innerHTML = items.map(item => {
      const valStr = typeof item.value === 'object'
        ? JSON.stringify(item.value)
        : String(item.value ?? '');
      return `<tr>
        <td style="font-family:monospace;font-size:12px;color:var(--accent-h);word-break:break-all">${escHtml(item.key)}</td>
        <td style="font-size:12px;color:var(--muted);word-break:break-all;max-width:400px">${escHtml(valStr)}</td>
      </tr>`;
    }).join('');
    toast('✅ 已加载 ' + items.length + ' 条缓存', 'ok');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="2" class="empty-tip" style="color:var(--red)">请求失败: ${e.message}</td></tr>`;
    rawEl.textContent = String(e);
    toast('⚠️ 请求失败: ' + e.message, 'error');
  }
}

function toggleCacheRaw() {
  cacheRawVisible = !cacheRawVisible;
  document.getElementById('cache-raw-box').style.display = cacheRawVisible ? '' : 'none';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Debug Tool ──
let dbgCurrentType = 'element';
let dbgHistory = [];
let _dbgPollTimer = null;

function dbgSwitchType(type, el) {
  dbgCurrentType = type;
  document.querySelectorAll('#dbg-type-tabs .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.dbg-form').forEach(f => f.style.display = 'none');
  const form = document.getElementById('dbg-form-' + type);
  if (form) form.style.display = '';
}

async function _dbgSendCommand(type, params) {
  try {
    const r = await fetch(`${BASE}/api/debug/command`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, params })
    }).then(r => r.json());
    if (r.code !== 0) { toast(r.message, 'error'); return; }
    toast('指令已下发，等待客户端执行...', 'ok');
    _dbgShowPending(r.data);
    _dbgStartPolling(r.data.id);
  } catch (e) {
    toast('发送失败: ' + e.message, 'error');
  }
}

function _dbgShowPending(cmd) {
  const statusEl = document.getElementById('dbg-result-status');
  statusEl.innerHTML = `<span class="dbg-status-dot pending"></span>pending — ${cmd.type}`;
  document.getElementById('dbg-result').innerHTML = '<span class="dbg-result-placeholder">等待客户端执行...</span>';
}

function _dbgStartPolling(cmdId) {
  if (_dbgPollTimer) clearInterval(_dbgPollTimer);
  const statusEl = document.getElementById('dbg-result-status');
  let polls = 0;
  _dbgPollTimer = setInterval(async () => {
    polls++;
    try {
      const r = await fetch(`${BASE}/api/debug/command/${cmdId}`).then(r => r.json());
      if (r.code !== 0) return;
      const cmd = r.data;
      if (cmd.status === 'running') {
        statusEl.innerHTML = `<span class="dbg-status-dot running"></span>running...`;
      }
      if (cmd.status === 'completed' || cmd.status === 'error') {
        clearInterval(_dbgPollTimer);
        _dbgPollTimer = null;
        _dbgRenderResult(cmd);
        fetchDebugHistory();
      }
    } catch {}
    if (polls > 60) { clearInterval(_dbgPollTimer); _dbgPollTimer = null; statusEl.innerHTML = '<span style="color:var(--yellow)">轮询超时</span>'; }
  }, 2000);
}

function _dbgRenderResult(cmd) {
  const statusEl = document.getElementById('dbg-result-status');
  const resultEl = document.getElementById('dbg-result');
  if (cmd.status === 'error') {
    statusEl.innerHTML = `<span class="dbg-status-dot error"></span>error`;
    resultEl.innerHTML = `<span style="color:var(--red)">${escHtml(cmd.error || '未知错误')}</span>`;
    return;
  }
  statusEl.innerHTML = `<span class="dbg-status-dot completed"></span>completed — ${cmd.completed_at || ''}`;

  if (cmd.type === 'screenshot' && cmd.result && cmd.result.base64) {
    resultEl.innerHTML = `<div style="margin-bottom:8px;color:var(--muted)">${escHtml(cmd.result.package)} / ${escHtml(cmd.result.activity)}</div><img src="data:image/jpeg;base64,${cmd.result.base64}" alt="screenshot" />`;
    return;
  }
  resultEl.textContent = JSON.stringify(cmd.result, null, 2);
}

function dbgSendQuick(type, params) {
  _dbgSendCommand(type, params || {});
}

function dbgSendElement() {
  _dbgSendCommand('element', {
    method: document.getElementById('dbg-el-method').value,
    value: document.getElementById('dbg-el-value').value,
    action: document.getElementById('dbg-el-action').value,
    timeout: parseInt(document.getElementById('dbg-el-timeout').value) || 3000,
    index: parseInt(document.getElementById('dbg-el-index').value) || 0,
  });
}

function dbgSendScript() {
  const code = document.getElementById('dbg-script-code').value.trim();
  if (!code) { toast('请输入代码', 'error'); return; }
  _dbgSendCommand('script', { code });
}

function dbgSendScreenshot() {
  _dbgSendCommand('screenshot', {
    quality: parseInt(document.getElementById('dbg-ss-quality').value) || 60,
  });
}

function dbgSendLayout() {
  _dbgSendCommand('layout', {
    depth: parseInt(document.getElementById('dbg-layout-depth').value) || 3,
  });
}

const DBG_TYPE_LABEL = {
  element: '🔍 元素', script: '⚡ 脚本',
  screenshot: '🖼️ 截图', page_info: '📱 页面', layout: '🌳 布局',
};

async function fetchDebugHistory() {
  try {
    const r = await fetch(`${BASE}/api/debug/commands?limit=30`).then(r => r.json());
    dbgHistory = r.data || [];
    const container = document.getElementById('dbg-history');
    const countEl = document.getElementById('dbg-history-count');
    if (!dbgHistory.length) {
      container.innerHTML = '<div class="empty-tip">暂无记录</div>';
      countEl.style.display = 'none';
      return;
    }
    countEl.textContent = dbgHistory.length;
    countEl.style.display = '';
    container.innerHTML = dbgHistory.map(cmd => `
      <div class="dbg-history-item" onclick="dbgViewHistory('${cmd.id}')">
        <span class="dbg-status-dot ${cmd.status}"></span>
        <span class="type-tag" style="font-size:11px;padding:2px 8px">${DBG_TYPE_LABEL[cmd.type] || cmd.type}</span>
        <span style="font-size:12px;color:var(--muted);flex:1">${escHtml(cmd.created_at || '')}</span>
        ${cmd.status === 'error' ? '<span style="font-size:11px;color:var(--red)">失败</span>' : ''}
      </div>`).join('');
  } catch {}
}

async function dbgViewHistory(cmdId) {
  try {
    const r = await fetch(`${BASE}/api/debug/command/${cmdId}`).then(r => r.json());
    if (r.code === 0) _dbgRenderResult(r.data);
  } catch {}
}

async function dbgClearAll() {
  await fetch(`${BASE}/api/debug/commands`, { method: 'DELETE' });
  toast('已清空调试记录');
  fetchDebugHistory();
  document.getElementById('dbg-result').innerHTML = '<span class="dbg-result-placeholder">发送指令后，结果将在此展示...</span>';
  document.getElementById('dbg-result-status').innerHTML = '';
}

// ── Refresh ──
async function refresh() {
  await Promise.all([fetchTasks(), fetchAlerts()]);
  document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString('zh-CN');
}

// Auto refresh every 10s
refresh();
setInterval(refresh, 10000);
</script>
